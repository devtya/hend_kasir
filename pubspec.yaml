name: hend_kasir
description: "Aplikasi Kasir Toko Sembako"
publish_to: 'none'
version: 1.3.3+13

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State Management
  flutter_bloc: ^9.1.0
  equatable: ^2.0.7

  # Local Database
  drift: ^2.25.1
  sqlite3_flutter_libs: ^0.5.28
  path_provider: ^2.1.5
  path: ^1.9.1

  # Dependency Injection
  get_it: ^8.0.3

  # Utility
  intl: ^0.20.2
  package_info_plus: ^8.0.0
  http: ^1.2.0
  open_filex: ^4.4.0

  # Barcode Scanner
  mobile_scanner: ^6.0.7
  shared_preferences: ^2.5.5

  # Printing (Thermal Printer)
  flutter_blue_plus: ^1.35.3

  # Backup & Restore (Legacy Excel — will be replaced by Supabase sync)
  excel: ^4.0.0
  file_picker: ^8.1.0
  share_plus: ^10.1.0
  permission_handler: ^11.3.0

  # Supabase Sync
  supabase_flutter: ^2.8.4
  uuid: ^4.5.1
  connectivity_plus: ^6.1.4
  device_info_plus: ^11.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Code Generation
  build_runner: ^2.4.15
  drift_dev: ^2.25.2

flutter:
  uses-material-design: true
