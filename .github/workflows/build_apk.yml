name: Build & Release APK
on:
  push:
    tags:
      - 'v*'
permissions:
  contents: write
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
      - name: Install dependencies
        run: flutter pub get

      # ✅ Tambah step ini
      - name: Get version from pubspec.yaml
        id: version
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //' | tr -d ' \r\n')
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Generate Drift code
        run: dart run build_runner build --delete-conflicting-outputs
      - name: Build APK
        run: |
          flutter build apk --release \
            --dart-define=SUPABASE_URL=${{ secrets.SUPABASE_URL }} \
            --dart-define=SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}

      # ✅ Ganti nama file pakai versi
      - name: Copy APK to root
        run: cp build/app/outputs/flutter-apk/app-release.apk hend_kasir-v${{ steps.version.outputs.VERSION }}.apk

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: hend_kasir-v${{ steps.version.outputs.VERSION }}.apk
          generate_release_notes: true